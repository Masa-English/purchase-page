<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>決済リンク生成 | Masa English 営業用</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 2em 1.5em; }
    h1 { font-size: 1.4rem; text-align: center; margin-bottom: .5em; }
    .subtitle { text-align: center; font-size: .85rem; color: #888; margin-bottom: 2em; }
    .card { background: #fff; border-radius: 12px; padding: 2em; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 1.5em; }
    label { display: block; font-weight: 700; margin-bottom: .5em; font-size: .95rem; }
    select { width: 100%; padding: .8em; font-size: 1.2rem; font-weight: 700; border: 2px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
    select:focus { border-color: #44b5a1; outline: none; }
    .preview { margin-top: 1.5em; padding: 1.2em; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
    .preview-label { font-size: .8rem; color: #888; margin-bottom: .3em; }
    .preview-url { font-size: .85rem; word-break: break-all; color: #333; font-family: monospace; background: #fff; padding: .6em; border-radius: 4px; border: 1px solid #ddd; }
    .btn-group { display: flex; gap: .8em; margin-top: 1.2em; }
    .btn { flex: 1; padding: 1em; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; text-align: center; transition: opacity .2s, transform .15s; }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-copy { background: #44b5a1; color: #fff; }
    .btn-open { background: #66badc; color: #fff; }
    .btn-line { background: #06C755; color: #fff; }
    .toast { position: fixed; bottom: 2em; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: .8em 2em; border-radius: 8px; font-size: .9rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999; }
    .toast.show { opacity: 1; }
    .amount-display { text-align: center; font-size: 2.4rem; font-weight: 900; margin: .5em 0; color: #44b5a1; }
    .recent { margin-top: 1em; }
    .recent h3 { font-size: .85rem; color: #888; margin-bottom: .5em; }
    .recent-list { list-style: none; }
    .recent-list li { padding: .5em 0; border-bottom: 1px solid #eee; font-size: .85rem; display: flex; justify-content: space-between; align-items: center; }
    .recent-list li a { color: #44b5a1; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Masa English 決済リンク生成</h1>
    <p class="subtitle">営業担当専用 — 顧客には生成されたリンクを共有してください</p>

    <div class="card">
      <label for="amount-select">お支払い金額を選択</label>
      <select id="amount-select"></select>
      <div class="amount-display" id="amount-display">36万円</div>

      <div class="preview">
        <div class="preview-label">顧客用リンク</div>
        <div class="preview-url" id="preview-url"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-copy" id="btn-copy">リンクをコピー</button>
        <button class="btn btn-open" id="btn-open">プレビュー</button>
      </div>
      <div class="btn-group">
        <button class="btn btn-line" id="btn-line">LINEで送る</button>
      </div>
    </div>

    <div class="card recent" id="recent-card" style="display:none;">
      <h3>最近生成したリンク</h3>
      <ul class="recent-list" id="recent-list"></ul>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // 簡易認証（セッション内のみ有効）
      var PASS_HASH = '529f7876cfe158e0307064f15fbd58b8438f5137f1c14f82d40339f9dddd53be';
      var authed = sessionStorage.getItem('sales-auth');
      if (!authed) {
        var pw = prompt('パスワードを入力してください');
        if (!pw) { document.body.innerHTML = '<p style="text-align:center;padding:3em;">アクセスが拒否されました。</p>'; return; }
        crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(function(buf) {
          var hash = Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
          if (hash === PASS_HASH) {
            sessionStorage.setItem('sales-auth', '1');
            location.reload();
          } else {
            document.body.innerHTML = '<p style="text-align:center;padding:3em;">パスワードが違います。</p>';
          }
        });
        return;
      }

      var BASE = 'https://purchase-page-six.vercel.app';
      var select = document.getElementById('amount-select');
      var display = document.getElementById('amount-display');
      var urlEl = document.getElementById('preview-url');
      var toast = document.getElementById('toast');

      // 金額セレクター生成（2万〜120万）
      for (var i = 1; i <= 120; i++) {
        var opt = document.createElement('option');
        opt.value = i * 10000;
        opt.textContent = i + '万円';
        if (i === 36) opt.selected = true;
        select.appendChild(opt);
      }

      function getUrl() {
        return BASE + '/?amount=' + select.value;
      }

      function update() {
        var man = parseInt(select.value) / 10000;
        display.textContent = man + '万円';
        urlEl.textContent = getUrl();
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
      }

      function saveRecent(amount) {
        var history = JSON.parse(localStorage.getItem('recent-links') || '[]');
        history.unshift({ amount: amount, date: new Date().toLocaleString('ja-JP'), url: getUrl() });
        if (history.length > 10) history = history.slice(0, 10);
        localStorage.setItem('recent-links', JSON.stringify(history));
        renderRecent();
      }

      function renderRecent() {
        var history = JSON.parse(localStorage.getItem('recent-links') || '[]');
        var card = document.getElementById('recent-card');
        var list = document.getElementById('recent-list');
        if (history.length === 0) { card.style.display = 'none'; return; }
        card.style.display = 'block';
        list.innerHTML = '';
        history.forEach(function(item) {
          var li = document.createElement('li');
          var man = parseInt(item.amount) / 10000;
          if (isNaN(man) || man < 2 || man > 120) return;
          var span = document.createElement('span');
          span.textContent = man + '万円 — ' + (item.date || '');
          var link = document.createElement('a');
          try { var parsed = new URL(item.url); } catch(e) { return; }
          if (parsed.origin !== BASE) return;
          link.href = parsed.href;
          link.target = '_blank';
          link.textContent = '開く';
          li.appendChild(span);
          li.appendChild(link);
          list.appendChild(li);
        });
      }

      select.addEventListener('change', update);

      document.getElementById('btn-copy').addEventListener('click', function() {
        navigator.clipboard.writeText(getUrl()).then(function() {
          showToast('リンクをコピーしました');
          saveRecent(parseInt(select.value));
        });
      });

      document.getElementById('btn-open').addEventListener('click', function() {
        window.open(getUrl(), '_blank');
      });

      document.getElementById('btn-line').addEventListener('click', function() {
        var url = getUrl();
        var man = parseInt(select.value) / 10000;
        var text = 'Masa Englishのお支払いページです（' + man + '万円）\n' + url;
        window.open('https://line.me/R/share?text=' + encodeURIComponent(text), '_blank');
        saveRecent(parseInt(select.value));
      });

      update();
      renderRecent();
    })();
  </script>
</body>
</html>
